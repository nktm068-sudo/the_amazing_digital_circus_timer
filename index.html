<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>конец уцц.</title>
    <style>
        body {
            background: #000;
            color: #f00;
            font-family: 'courier new', monospace;
            text-align: center;
            margin: 0;
            overflow: hidden;
            transition: background 0.5s;
        }
        /* Контейнер для видео */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
        }
        #video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Большой красный таймер со свечением */
        #timer {
            font-size: 130px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000;
            margin-top: 30vh;
            display: inline-block;
        }
        /* Крупный текст статуса */
        .status {
            font-size: 28px;
            color: #555;
            margin-top: 30px;
            letter-spacing: 5px;
        }

        /* ОБЫЧНОЕ ДРОЖАНИЕ (когда до конца меньше 24 часов) */
        @keyframes glitch-shake {
            0% { transform: translate(0, 0) skew(0deg); }
            20% { transform: translate(2px, -1px) skew(2deg); }
            40% { transform: translate(2px, 2px) skew(1deg); }
            60% { transform: translate(1px, 2px) skew(0deg); }
            80% { transform: translate(2px, -2px) skew(-1deg); }
            100% { transform: translate(0, 0) skew(0deg); }
        }

        /* КРИТИЧЕСКОЕ ДРОЖАНИЕ (последняя минута перед нулем) */
        @keyframes extreme-shake {
            0% { transform: translate(0, 0) scale(1); }
            10% { transform: translate(-5px, 3px) scale(1.05) skew(-3deg); }
            30% { transform: translate(5px, -3px) scale(0.95) skew(4deg); }
            50% { transform: translate(-4px, -4px) scale(1.02); }
            70% { transform: translate(4px, 4px) scale(0.98) skew(-2deg); }
            90% { transform: translate(-3px, 2px) scale(1.03); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .glitch-active {
            animation: glitch-shake 0.3s infinite linear;
            text-shadow: 0 0 40px #ff0000, 3px 0 0 #00ffff, -3px 0 0 #ff00ff !important;
        }

        .extreme-active {
            animation: extreme-shake 0.1s infinite linear;
            text-shadow: 0 0 50px #ff0000, 6px 0 0 #00ffff, -6px 0 0 #ff00ff !important;
            color: #fff !important;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="status">ожидание критического сбоя</div>
    <div id="timer">00:00:00:00</div>
    <div class="status">пианино играет последние такты...</div>
</div>

<!-- Окно плеера -->
<div id="video-container">
    <iframe id="yt-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<audio id="piano" src="musis.mp3" loop autoplay></audio>

<script>
    // 1. ПОЛНЫЙ СПИСОК ВСЕХ 8 СЕРИЙ (Разбиты пробелами)
    const brokenUrls = [
        "https:// www. youtube. com/ embed/ HwAPLk_sQ3w ?enablejsapi=1&autoplay=1", // 1 серия
        "https:// www. youtube. com/ embed/ 4ofJpOEXrZs ?enablejsapi=1&autoplay=1", // 2 серия
        "https:// www. youtube. com/ embed/ bKjfw77cxeQ ?enablejsapi=1&autoplay=1", // 3 серия
        "https:// www. youtube. com/ embed/ Q9KWcWKo2T8 ?enablejsapi=1&autoplay=1", // 4 серия
        "https:// www. youtube. com/ embed/ L4p2gN2CzsA ?enablejsapi=1&autoplay=1", // 5 серия
        "https:// www. youtube. com/ embed/ mOvhHim78YA ?enablejsapi=1&autoplay=1", // 6 серия
        "https:// www. youtube. com/ embed/ oaOG1xOk7XY ?enablejsapi=1&autoplay=1", // 7 серия
        "https:// www. youtube. com/ embed/ DMNlzf8PiEM ?enablejsapi=1&autoplay=1"  // 8 серия
    ];

    let currentEpisode = 0; 

    // Функция, которая очищает пробелы
    function cleanUrl(urlWithSpaces) {
        return urlWithSpaces.replace(/\s+/g, ''); 
    }

    // ДАТА КОНЦА ЦИФРОВОГО ЦИРКА: 19 июня 2026 в 00:00:00
    const countdowndate = new Date("June 19, 2026 00:00:00").getTime();
    
    const piano = document.getElementById('piano');
    const videoContainer = document.getElementById('video-container');
    const ytPlayer = document.getElementById('yt-player');
    const timerElement = document.getElementById('timer');
    const statusTop = document.querySelector('.status:first-child');

    const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = countdowndate - now;

        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);

        timerElement.innerHTML = d + "d " + h + "h " + m + "m " + s + "s";

        // Проверка времени для включения эффектов
        if (distance > 0) {
            if (distance < 1000 * 60) { 
                // Последняя минута перед концом
                timerElement.className = '';
                timerElement.classList.add('extreme-active');
                statusTop.innerHTML = "КРИТИЧЕСКИЙ СБОЙ СИСТЕМЫ!!!";
                statusTop.style.color = "#ff0000";
            } else if (distance < 1000 * 60 * 60 * 24) { 
                // Меньше 24 часов до конца
                timerElement.classList.add('glitch-active');
            }
        }

        // МОМЕНТ Х: Время вышло!
        if (distance < 0) {
            clearInterval(x);
            piano.pause(); 
            
            // Запуск первой серии
            ytPlayer.src = cleanUrl(brokenUrls[currentEpisode]); 
            videoContainer.style.display = "block"; 
        }
    }, 1000);

    // Слушаем сигналы от плеера для автопереключения серий
    window.addEventListener('message', function(event) {
        if (event.origin.includes("youtube.com")) {
            try {
                const data = JSON.parse(event.data);
                // Если текущая серия полностью досмотрена
                if (data.event === 'infoDelivery' && data.info && data.info.playerState === 0) {
                    currentEpisode++; 
                    
                    if (currentEpisode < brokenUrls.length) {
                        // Чистим от пробелов и запускаем следующую серию
                        ytPlayer.src = cleanUrl(brokenUrls[currentEpisode]);
                    } else {
                        // Текст, когда просмотрены все 8 серий
                        document.body.innerHTML = "<div style='color:red; font-size:40px; margin-top:45vh; font-family:monospace; font-weight:bold;'>ЦИФРОВОЙ ЦИРК ПОЛНОСТЬЮ УНИЧТОЖЕН</div>";
                    }
                }
            } catch (e) {}
        }
    });
</script>
</body>
</html>
