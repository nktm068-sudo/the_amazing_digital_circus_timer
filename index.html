<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>конец уцц.</title>
    <style>
        body {
            background: #000;
            color: #f00;
            font-family: 'courier new', monospace;
            text-align: center;
            margin: 0;
            overflow: hidden;
            transition: background 0.5s;
        }
        /* Контейнер для видео */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
        }
        #video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Таймер */
        #timer {
            font-size: 130px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000;
            margin-top: 30vh;
            display: inline-block;
        }
        /* Текст статуса */
        .status {
            font-size: 28px;
            color: #555;
            margin-top: 30px;
            letter-spacing: 5px;
        }

        /* ЭФФЕКТ ДРОЖАНИЯ И ГЛИТЧА */
        @keyframes glitch-shake {
            0% { transform: translate(0, 0) skew(0deg); }
            10% { transform: translate(-2px, 1px) skew(-1deg); }
            20% { transform: translate(2px, -1px) skew(2deg); }
            30% { transform: translate(-1px, -2px) skew(0deg); }
            40% { transform: translate(2px, 2px) skew(1deg); }
            50% { transform: translate(-2px, -1px) skew(-2deg); }
            60% { transform: translate(1px, 2px) skew(0deg); }
            70% { transform: translate(-2px, 1px) skew(1deg); }
            80% { transform: translate(2px, -2px) skew(-1deg); }
            90% { transform: translate(-1px, 2px) skew(2deg); }
            100% { transform: translate(0, 0) skew(0deg); }
        }

        /* Класс, который JS включит, когда останется меньше дня */
        .glitch-active {
            animation: glitch-shake 0.3s infinite linear;
            text-shadow: 0 0 40px #ff0000, 3px 0 0 #00ffff, -3px 0 0 #ff00ff !important;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="status">ожидание критического сбоя</div>
    <div id="timer">00:00:00:00</div>
    <div class="status">пианино играет последние такты...</div>
</div>

<!-- Окно с YouTube -->
<div id="video-container">
    <iframe id="yt-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<audio id="piano" src="music.mp3" loop autoplay></audio>

<script>
    // 1. Ссылка с пробелами
    const brokenUrl = "https:// www. youtube. com/ embed/ HwAPLk_sQ3w ?list= PL2XX3iRzbgwyb6l-R0T_6VPb0p1tTl85Y &autoplay=1";

    // 2. Функция очистки пробелов
    function cleanUrl(urlWithSpaces) {
        return urlWithSpaces.replace(/\s+/g, ''); 
    }

    // НОВАЯ ДАТА: 19 июня 2026 в 00:00:00
    const countdowndate = new Date("June 16, 2026 21:10:00").getTime();
    
    const piano = document.getElementById('piano');
    const videoContainer = document.getElementById('video-container');
    const ytPlayer = document.getElementById('yt-player');
    const timerElement = document.getElementById('timer');
    const statusTop = document.querySelector('.status:first-child'); // Верхний текст

    const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = countdowndate - now;

        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);

        timerElement.innerHTML = d + "d " + h + "h " + m + "m " + s + "s";

        // Эффекты перед концом
        if (distance > 0) {
            if (distance < 1000 * 60) { 
                // Осталась МЕНЬШЕ МИНУТЫ — супер-взрыв и смена текста!
                timerElement.className = '';
                timerElement.classList.add('extreme-active');
                statusTop.innerHTML = "КРИТИЧЕСКИЙ СБОЙ СИСТЕМЫ!!!";
                statusTop.style.color = "#ff0000";
            } else if (distance < 1000 * 60 * 60 * 24) { 
                // Осталось меньше дня — обычная тряска
                timerElement.classList.add('glitch-active');
            }
        }

        // Момент Х: 19 июня 00:00 — Цифровому Цирку конец
        if (distance < 0) {
            clearInterval(x);
            piano.pause(); 
            ytPlayer.src = cleanUrl(brokenUrl); 
            videoContainer.style.display = "block";
        }
    }, 1000);
</script>

</body>
</html>
